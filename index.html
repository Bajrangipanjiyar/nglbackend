<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Anonymous Message</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-900 to-purple-900 min-h-screen flex items-center justify-center p-4 font-sans text-white antialiased">

    <main class="glass rounded-3xl p-6 md:p-8 w-full max-w-md shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-purple-500 rounded-full blur-[80px] opacity-50 pointer-events-none"></div>

        <div class="text-center mb-6 relative z-10">
            <h1 class="text-2xl font-bold mb-1 tracking-tight">Send Anonymous Message 👀</h1>
            <p id="username-display" class="text-purple-300 font-medium text-sm">Loading...</p>
        </div>

        <form id="message-form" class="relative z-10 flex flex-col gap-4">
            <textarea 
                id="message-input"
                rows="4" 
                class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 resize-none transition-all shadow-inner"
                placeholder="Send me anonymous messages..."
                required
            ></textarea>

            <button 
                type="submit" 
                id="submit-btn"
                class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3.5 px-6 rounded-2xl transition-all duration-300 shadow-lg"
            >
                Send Message
            </button>
        </form>

        <div id="status-message" class="hidden mt-4 p-3 rounded-xl text-sm font-medium text-center transition-all relative z-10"></div>
    </main>

    <script>
        const BACKEND_URL = 'https://backendofuniwhisper.onrender.com';

        document.addEventListener('DOMContentLoaded', () => {
            function getUsername() {
                const pathMatch = window.location.pathname.match(/\/ig\/([^\/]+)/);
                if (pathMatch && pathMatch[1]) return pathMatch[1];
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('u') || 'anonymous_user';
            }

            const targetUsername = getUsername();
            document.getElementById('username-display').textContent = `To: @${targetUsername}`;

            const form = document.getElementById('message-form');
            const messageInput = document.getElementById('message-input');
            const submitBtn = document.getElementById('submit-btn');
            const statusMessage = document.getElementById('status-message');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const message = messageInput.value.trim();
                if (!message) return;

                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';

                try {
                    const response = await fetch(`${BACKEND_URL}/api/message`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instagram_username: targetUsername, message: message })
                    });

                    if (response.ok) {
                        statusMessage.textContent = 'Message sent secretly! 🤫';
                        statusMessage.className = 'mt-4 p-3 rounded-xl text-sm font-medium text-center bg-green-500/20 text-green-300 border border-green-500/30 fade-in block relative z-10';
                        messageInput.value = ''; 
                        setTimeout(() => { statusMessage.classList.add('hidden'); }, 4000);
                    } else {
                        throw new Error('Failed');
                    }
                } catch (error) {
                    statusMessage.textContent = 'Failed to send. Try again!';
                    statusMessage.className = 'mt-4 p-3 rounded-xl text-sm font-medium text-center bg-red-500/20 text-red-300 border border-red-500/30 fade-in block relative z-10';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Message';
                }
            });
        });
    </script>
</body>
</html>
